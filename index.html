<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

        .btn-silver { background: #333; color: #fff; }
        .info-banco { font-size: 0.9rem; color: #aaa; margin-top: 20px; padding: 15px; border: 1px dashed #555; }

</head>

    <div class="info-banco">
        Pago vía NU<br>

</html>
